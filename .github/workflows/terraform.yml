name: 'Azure Terraform Automation'

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    name: 'Run Tests'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r app/requirements.txt -r app/requirements-dev.txt

    - name: Run pytest
      run: pytest app/test_tracker.py -v

  docker:
    name: 'Build & Push Docker Image'
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set image tags
      id: meta
      run: |
        SHA=$(echo $GITHUB_SHA | cut -c1-7)
        echo "sha_tag=devesh0905/etf-tracker:$SHA" >> $GITHUB_OUTPUT
        echo "latest_tag=devesh0905/etf-tracker:latest" >> $GITHUB_OUTPUT

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: ./app
        push: true
        tags: |
          devesh0905/etf-tracker:latest
          devesh0905/etf-tracker:${{ github.sha }}

  terraform:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    needs: docker
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init

    - name: Terraform Format Check
      run: terraform fmt -check

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Plan
      run: terraform plan
